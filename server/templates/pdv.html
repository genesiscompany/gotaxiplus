<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoTaxi PDV — Acesso do Parceiro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-icon img {
      height: 52px;
      width: auto;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }

    .logo h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .logo p {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.625rem;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #f59e0b;
    }

    input::placeholder { color: #475569; }

    button[type="submit"] {
      width: 100%;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none;
      border-radius: 0.625rem;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 700;
      color: #0f172a;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(15,23,42,0.3);
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><img src="/assets/logo.png" alt="GoTaxi" /></div>
      <h1>Painel do Parceiro</h1>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com.br" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" id="submitBtn">Entrar no Painel</button>
      <div class="error" id="errorMsg"></div>
    </form>

    <div class="footer">GoTaxi &copy; 2025 — Acesso exclusivo para parceiros</div>
  </div>

  <script>
    const API = "https://app.gotaxi.com.br/api/pdv/login";
    const PDV_URL = "https://app.gotaxi.com.br/pdv/";

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const btn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entrando...';
      errorMsg.style.display = "none";

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Credenciais inválidas");
        }

        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
          user: data.usuario,
          empresa: data.empresa,
          token: data.token,
        }))));

        window.location.href = PDV_URL + "?_auth=" + encodeURIComponent(payload);

      } catch (err) {
        errorMsg.textContent = err.message || "Falha de conexão. Tente novamente.";
        errorMsg.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "Entrar no Painel";
      }
    });
  </script>
</body>
</html>
