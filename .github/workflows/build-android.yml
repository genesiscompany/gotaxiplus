name: Build Android (AAB - Produção)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil do EAS (production gera AAB para Play Store)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

jobs:
  build:
    name: Build AAB com EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependências
        run: npm install

      - name: Disparar build no EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait --clear-cache
